# ============================================================
# SkillGraph AI — Render Deployment Configuration
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ─── Backend Web Service ──────────────────────────────────
  - type: web
    name: skillgraph-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: skillgraph-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: CORS_ORIGIN
        sync: false   # Set this manually in Render dashboard to your Vercel URL
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info

# ─── PostgreSQL Database ──────────────────────────────────
databases:
  - name: skillgraph-db
    databaseName: skillgraph_db
    user: skillgraph_user
    region: singapore
    plan: free
